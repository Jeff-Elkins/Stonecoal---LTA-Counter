<h1>Stonecoal Branch Mine No. 2</h1>
<h2>Days Since Last Lost Time Accident</h2>

<div id="days">0</div>

<h2>Everyone In. Everyone Out. Every Day.</h2>

</div>

<script>
const DATE="2026-01-08";

function d(str){
let [y,m,d]=str.split("-");
return new Date(y,m-1,d,12);
}

function update(){
let now=new Date();
let today=new Date(now.getFullYear(),now.getMonth(),now.getDate(),12);
let diff=Math.floor((today-d(DATE))/86400000);

let el=document.getElementById("days");
el.textContent=diff;
el.className= diff<365?"red":"green";
}

update();
setInterval(update,3600000);
</script>
