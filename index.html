<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stonecoal Branch Mine No. 2 Safety Counter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(8, 20, 30, 0.70), rgba(8, 20, 30, 0.70)),
        linear-gradient(135deg, #0d2f4f 0%, #184d78 55%, #0b2236 100%);
      color: white;
      overflow: hidden;
    }

    .frame {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .board {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      border: 10px solid #8a8f96;
      border-radius: 22px;
      background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.02),
          rgba(255,255,255,0.02) 10px,
          rgba(0,0,0,0.02) 10px,
          rgba(0,0,0,0.02) 20px
        );
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.08),
        0 0 30px rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 36px 48px;
    }

    .logo {
      max-width: 540px;
      width: 42%;
      height: auto;
      margin-bottom: 24px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.45));
    }

    .headline {
      font-size: clamp(28px, 3vw, 52px);
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .mine-name {
      font-size: clamp(26px, 2.6vw, 46px);
      font-weight: 700;
      margin-bottom: 26px;
      line-height: 1.2;
    }

    .subhead {
      font-size: clamp(22px, 2vw, 34px);
      font-weight: 600;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .counter {
      font-size: clamp(100px, 14vw, 220px);
      font-weight: 900;
      line-height: 1;
      margin: 8px 0 12px 0;
      text-shadow: 0 4px 14px rgba(0,0,0,0.45);
    }

    .footer {
      font-size: clamp(16px, 1.2vw, 24px);
      opacity: 0.9;
      margin-top: 8px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="board">
      <img src="logo.png" alt="Ramaco Logo" class="logo" />

      <div class="headline">Safety Performance</div>
      <div class="mine-name">Stonecoal Branch Mine No. 2</div>

      <div class="subhead">Days Since Last Lost Time Accident</div>
      <div id="counter" class="counter">0</div>

      <div class="footer">Everyone In. Everyone Out. Every Day.</div>
    </div>
  </div>

  <script>
    const lastIncidentDate = new Date("2025-06-01T00:00:00");

    const today = new Date();
    const msPerDay = 1000 * 60 * 60 * 24;
    const diff = today.getTime() - lastIncidentDate.getTime();
    const days = Math.floor(diff / msPerDay);

    const counter = document.getElementById("counter");
    counter.textContent = days >= 0 ? days : 0;

    if (days < 365) {
      counter.style.color = "#ff3b30";
    } else {
      counter.style.color = "#32d74b";
    }
  </script>
</body>
</html>
